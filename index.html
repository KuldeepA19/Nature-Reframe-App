<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nature Reframe | Pro Experience</title>
    <style>
        :root { --forest: #2D5A27; --mint: #DCE7DA; --earth: #6D4C41; }
        body { margin: 0; background: #E3F2FD; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; min-height: 100vh; color: var(--forest); }
        .app-shell { width: 100%; max-width: 450px; background: white; padding: 25px; display: flex; flex-direction: column; align-items: center; box-shadow: 0 0 40px rgba(0,0,0,0.05); }
        
        /* Audio Controls */
        .audio-pill { background: var(--mint); padding: 8px 20px; border-radius: 30px; font-size: 0.8rem; margin-bottom: 20px; cursor: pointer; border: none; color: var(--forest); font-weight: bold; }
        
        .garden-area { height: 100px; display: flex; align-items: flex-end; gap: 8px; margin-bottom: 20px; border-bottom: 2px solid #eee; width: 100%; justify-content: center; overflow: hidden; }
        .plant { font-size: 1.8rem; animation: grow 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes grow { from { transform: translateY(20px) scale(0); } to { transform: translateY(0) scale(1); } }
        
        textarea { width: 100%; height: 90px; border: 1.5px solid var(--mint); border-radius: 15px; padding: 15px; font-size: 1rem; margin-bottom: 15px; box-sizing: border-box; outline: none; }
        .btn-main { background: var(--forest); color: white; border: none; width: 100%; padding: 15px; border-radius: 15px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .btn-share { background: white; color: var(--forest); border: 1.5px solid var(--forest); width: 100%; padding: 12px; border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 0.9rem; }
        
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; margin: 15px 0; }
        .stat-card { background: #f9f9f9; padding: 10px; border-radius: 12px; text-align: center; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="app-shell">
    <button class="audio-pill" onclick="toggleMusic()" id="musicBtn">🔈 Play Lo-Fi Rain</button>
    
    <div class="garden-area" id="garden"><span class="plant">🌳</span></div>

    <h2 style="margin:0 0 10px 0; text-align: center;">Nature Reframe</h2>
    <textarea id="thoughtInput" placeholder="Let go of anger or stress here..."></textarea>
    
    <button class="btn-main" onclick="processThought()">Plant Positive Thought</button>
    <button class="btn-share" onclick="shareApp()">📤 Share My Peace</button>

    <div class="stats">
        <div class="stat-card">🌱 Plants: <span id="pCount">1</span></div>
        <div class="stat-card">✨ Peace: <span id="pLevel">10%</span></div>
    </div>
</div>

<audio id="bgMusic" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg">
</audio>

<script>
    let count = 1;
    let isMusicPlaying = false;
    const music = document.getElementById('bgMusic');

    function toggleMusic() {
        if (!isMusicPlaying) {
            music.play();
            document.getElementById('musicBtn').innerText = "🔊 Mute Music";
        } else {
            music.pause();
            document.getElementById('musicBtn').innerText = "🔈 Play Lo-Fi Rain";
        }
        isMusicPlaying = !isMusicPlaying;
    }

    function processThought() {
        const input = document.getElementById('thoughtInput').value;
        if(!input) return;

        // Vibrate
        if (navigator.vibrate) navigator.vibrate(50);

        count++;
        document.getElementById('pCount').innerText = count;
        document.getElementById('pLevel').innerText = (count * 10) + "%";

        const plants = ["🌱", "🌿", "🌸", "🌻", "🌳", "🌲"];
        const p = document.createElement('span');
        p.className = 'plant';
        p.innerText = plants[Math.floor(Math.random() * plants.length)];
        document.getElementById('garden').appendChild(p);

        document.getElementById('thoughtInput').value = "";
    }

    // PHASE 2: SHARE FEATURE
    async function shareApp() {
        const shareData = {
            title: 'Nature Reframe',
            text: `I've grown ${count} plants and reached ${count * 10}% Peace today! 🌿 Join me in reframing stress.`,
            url: window.location.href
        };

        try {
            await navigator.share(shareData);
        } catch (err) {
            alert("Share this link with friends: " + window.location.href);
        }
    }
</script>
</body>
</html>
