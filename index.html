<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nature Reframe | Daily Growth</title>
    <style>
        :root {
            --forest-green: #2D5A27;
            --leaf-green: #91AC8F;
            --sky-blue: #E3F2FD;
            --earth-brown: #6D4C41;
            --soft-white: rgba(255, 255, 255, 0.9);
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(180deg, #E3F2FD 0%, #C8E6C9 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--forest-green);
        }

        .container {
            width: 85%;
            max-width: 400px;
            background: var(--soft-white);
            backdrop-filter: blur(15px);
            padding: 2rem;
            border-radius: 35px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            text-align: center;
        }

        .daily-seed {
            background: #fdfdfd;
            border: 1px dashed var(--leaf-green);
            padding: 15px;
            border-radius: 20px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            color: var(--earth-brown);
            font-style: italic;
        }

        .sound-toggle {
            background: white;
            border: 1px solid var(--leaf-green);
            color: var(--forest-green);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.75rem;
            margin-bottom: 1.5rem;
            transition: 0.3s;
        }

        textarea {
            width: 100%;
            height: 110px;
            border: 1.5px solid var(--leaf-green);
            border-radius: 18px;
            padding: 1rem;
            margin-bottom: 1rem;
            box-sizing: border-box;
            font-size: 1rem;
            outline: none;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }

        button.main-btn {
            background: var(--forest-green);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
        }

        #output {
            margin-top: 1.5rem;
            padding: 1.2rem;
            border-radius: 20px;
            display: none;
            background: #eef7ee;
            border-left: 4px solid var(--forest-green);
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <div class="daily-seed" id="dailySeed">
        🌱 Loading today's seed...
    </div>

    <button class="sound-toggle" onclick="toggleSound()" id="soundBtn">🔈 Nature Sounds: Off</button>
    
    <h1>Nature Reframe 🌿</h1>
    <p style="margin-top: -10px; margin-bottom: 20px; opacity: 0.8;">Turn your storms into sunlight.</p>
    
    <textarea id="userInput" placeholder="What's on your mind? (Loneliness, Anger, Stress...)"></textarea>
    
    <button class="main-btn" onclick="transformThought()">Transform Thought</button>

    <div id="output"></div>
</div>

<audio id="natureSound" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
</audio>

<script>
    // Daily Seeds Logic
    const seeds = [
        "Your growth is not always visible, but it is always happening.",
        "Like the forest after rain, you will smell sweeter and stand taller after the storm.",
        "One leaf doesn't make a tree. Give yourself time to build your strength.",
        "Even the sun must set to let the world rest. It's okay for you to rest too.",
        "You don't have to be perfect to be a beautiful part of nature."
    ];

    // Set the daily seed based on the day of the year
    const dayOfYear = Math.floor((new Date() - new Date(new Date().getFullYear(), 0, 0)) / 86400000);
    document.getElementById('dailySeed').innerText = "Today's Seed: " + seeds[dayOfYear % seeds.length];

    let isPlaying = false;
    const audio = document.getElementById('natureSound');

    function toggleSound() {
        if (!isPlaying) {
            audio.play();
            document.getElementById('soundBtn').innerText = "🔊 Nature Sounds: On";
            document.getElementById('soundBtn').style.background = "#DFF0D8";
        } else {
            audio.pause();
            document.getElementById('soundBtn').innerText = "🔈 Nature Sounds: Off";
            document.getElementById('soundBtn').style.background = "white";
        }
        isPlaying = !isPlaying;
    }

    function transformThought() {
        const input = document.getElementById('userInput').value.toLowerCase();
        const outputDiv = document.getElementById('output');
        
        const responses = {
            lonely: "🌿 Nature is never truly lonely; the roots always talk to the trees. You are part of something bigger than this moment.",
            angry: "🌊 The ocean is powerful but calm underneath. Take three deep breaths and let the waves of anger pull back.",
            stress: "🍃 A heavy snow can bend a branch, but the branch doesn't break—it eventually lets the snow fall. Release your burden.",
            default: "☀️ You have survived 100% of your hardest days. You are as resilient as the earth itself."
        };

        let result = responses.default;
        if (input.includes("lonely")) result = responses.lonely;
        else if (input.includes("angry") || input.includes("mad")) result = responses.angry;
        else if (input.includes("stress") || input.includes("sad") || input.includes("tired")) result = responses.stress;

        outputDiv.innerHTML = `<strong>Growth Note:</strong><br>${result}`;
        outputDiv.style.display = 'block';
        document.getElementById('userInput').value = "";
    }
</script>

</body>
</html>
