<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nature Reframe | Zen Mode</title>
    <style>
        :root {
            --forest-green: #2D5A27;
            --leaf-green: #91AC8F;
            --sky-blue: #E3F2FD;
            --earth-brown: #6D4C41;
        }

        body {
            margin: 0;
            font-family: 'Helvetica Neue', sans-serif;
            background: linear-gradient(180deg, #E3F2FD 0%, #C8E6C9 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--forest-green);
            overflow: hidden;
        }

        .container {
            width: 85%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(15px);
            padding: 2.5rem;
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            text-align: center;
        }

        .sound-toggle {
            background: none;
            border: 1px solid var(--leaf-green);
            color: var(--forest-green);
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
            margin-bottom: 1rem;
        }

        textarea {
            width: 100%;
            height: 100px;
            border: 1.5px solid var(--leaf-green);
            border-radius: 20px;
            padding: 1rem;
            margin: 1rem 0;
            box-sizing: border-box;
            font-size: 1rem;
            outline: none;
        }

        button.main-btn {
            background: var(--forest-green);
            color: white;
            border: none;
            padding: 1.2rem 2rem;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 15px rgba(45, 90, 39, 0.3);
        }

        #output {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 20px;
            display: none;
            background: #f0f7ef;
            line-height: 1.6;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <button class="sound-toggle" onclick="toggleSound()" id="soundBtn">🔈 Play Forest Birds</button>
    <h1>Nature Reframe 🌿</h1>
    <p>Release your thoughts to the forest.</p>
    
    <textarea id="userInput" placeholder="How are you really feeling?"></textarea>
    
    <button class="main-btn" onclick="transformThought()">Transform & Release</button>

    <div id="output"></div>
</div>

<!-- Background Forest Audio -->
<audio id="natureSound" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    <!-- Using a placeholder, in a real app we'd use a forest .mp3 -->
</audio>

<script>
    let isPlaying = false;
    const audio = document.getElementById('natureSound');

    function toggleSound() {
        if (!isPlaying) {
            audio.play();
            document.getElementById('soundBtn').innerText = "🔊 Mute Forest";
        } else {
            audio.pause();
            document.getElementById('soundBtn').innerText = "🔈 Play Forest Birds";
        }
        isPlaying = !isPlaying;
    }

    function transformThought() {
        const input = document.getElementById('userInput').value.toLowerCase();
        const outputDiv = document.getElementById('output');
        
        const responses = {
            lonely: [
                "🌿 The stars are far apart, yet they light up the same sky. You are connected in ways you can't see yet.",
                "🌱 Being alone is when your soul does its deepest growing. Be patient with yourself."
            ],
            angry: [
                "🌊 Let your anger be like a wave. It rises high, but it must eventually crash and join the calm ocean.",
                "🍃 A strong wind may bend the tree, but it also strengthens the trunk. Breathe through the storm."
            ],
            default: [
                "✨ You are a vital part of this world's ecosystem. Your presence matters.",
                "☀️ Just as the sun rises every day, you have a fresh chance to start over right now."
            ]
        };

        let category = "default";
        if (input.includes("lonely")) category = "lonely";
        if (input.includes("angry") || input.includes("mad")) category = "angry";

        const randomPick = responses[category][Math.floor(Math.random() * responses[category].length)];

        outputDiv.innerHTML = `<strong>Nature's Response:</strong><br>${randomPick}`;
        outputDiv.style.display = 'block';
        document.getElementById('userInput').value = "";
    }
</script>

</body>
</html>
