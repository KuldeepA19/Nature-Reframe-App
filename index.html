# Nature Reframe — Complete Wellness App (HTML/CSS/JS)

Save this as `index.html` and open it in your browser.

```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nature Reframe</title>

<style>
:root {
    --forest: #2D5A27;
    --mint: #DCE7DA;
    --earth: #6D4C41;
    --bg: #E8F5E9;
    --card: #ffffff;
    --text: #1b4332;
}

body.dark {
    --bg: #121212;
    --card: #1f1f1f;
    --text: #f1f1f1;
    --mint: #2d2d2d;
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: var(--bg);
    display: flex;
    justify-content: center;
    min-height: 100vh;
    color: var(--text);
    transition: 0.3s ease;
}

.app-shell {
    width: 100%;
    max-width: 460px;
    background: var(--card);
    padding: 24px;
    box-shadow: 0 0 30px rgba(0,0,0,0.08);
    display: flex;
    flex-direction: column;
    align-items: center;
    animation: breathe 5s infinite ease-in-out;
}

@keyframes breathe {
    0% { transform: scale(1); }
    50% { transform: scale(1.01); }
    100% { transform: scale(1); }
}

.top-controls {
    display: flex;
    gap: 10px;
    width: 100%;
    margin-bottom: 20px;
}

.audio-pill,
.dark-btn {
    flex: 1;
    border: none;
    padding: 10px;
    border-radius: 30px;
    cursor: pointer;
    font-weight: bold;
    background: var(--mint);
    color: var(--forest);
}

.garden-area {
    width: 100%;
    min-height: 120px;
    display: flex;
    align-items: flex-end;
    gap: 8px;
    overflow-x: auto;
    border-bottom: 2px solid #ddd;
    padding: 10px 0;
    margin-bottom: 20px;
}

.plant {
    font-size: 2rem;
    animation: grow 0.6s ease;
}

@keyframes grow {
    from {
        transform: translateY(20px) scale(0);
        opacity: 0;
    }
    to {
        transform: translateY(0) scale(1);
        opacity: 1;
    }
}

h1 {
    margin: 10px 0;
    font-size: 2rem;
}

.subtitle {
    margin-bottom: 20px;
    opacity: 0.8;
    text-align: center;
}

.mood-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    width: 100%;
    margin-bottom: 15px;
}

.mood-btn {
    border: none;
    padding: 10px;
    border-radius: 12px;
    cursor: pointer;
    background: var(--mint);
    font-size: 1.2rem;
}

.mood-btn.active {
    background: var(--forest);
    color: white;
}

textarea {
    width: 100%;
    height: 100px;
    border-radius: 15px;
    border: 2px solid var(--mint);
    padding: 15px;
    resize: none;
    outline: none;
    font-size: 1rem;
    margin-bottom: 15px;
    background: transparent;
    color: var(--text);
}

.btn-main,
.btn-share,
.btn-reset {
    width: 100%;
    border: none;
    padding: 14px;
    border-radius: 15px;
    font-weight: bold;
    cursor: pointer;
    margin-bottom: 10px;
}

.btn-main {
    background: var(--forest);
    color: white;
}

.btn-share {
    background: transparent;
    border: 2px solid var(--forest);
    color: var(--forest);
}

.btn-reset {
    background: #d32f2f;
    color: white;
}

.stats {
    width: 100%;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-top: 15px;
}

.stat-card {
    background: var(--mint);
    padding: 12px;
    border-radius: 12px;
    text-align: center;
    font-size: 0.85rem;
}

#messageBox {
    width: 100%;
    margin-top: 15px;
    background: #f1f8e9;
    padding: 15px;
    border-radius: 15px;
    display: none;
    text-align: center;
    font-weight: bold;
    color: #2e7d32;
}

body.dark #messageBox {
    background: #2c3e2f;
    color: #b9f6ca;
}

.history {
    width: 100%;
    margin-top: 20px;
}

.history h3 {
    margin-bottom: 10px;
}

.history-item {
    background: var(--mint);
    padding: 10px;
    border-radius: 10px;
    margin-bottom: 8px;
    font-size: 0.9rem;
}

</style>
</head>
