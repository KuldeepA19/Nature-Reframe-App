<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nature Reframe Pro</title>
    <!-- The Manifest Link (For Android Install) -->
    <link rel="manifest" href="/manifest.json">
    <style>
        :root {
            --forest: #2D5A27;
            --mint: #DCE7DA;
            --accent: #6D4C41;
        }

        body {
            margin: 0;
            background: #E3F2FD;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            color: var(--forest);
        }

        .app-shell {
            width: 100%;
            max-width: 450px;
            background: linear-gradient(180deg, #FFFFFF 0%, #F1F8E9 100%);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 0 50px rgba(0,0,0,0.05);
        }

        /* The Mood Garden */
        .garden-area {
            height: 120px;
            display: flex;
            align-items: flex-end;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--mint);
            width: 100%;
            justify-content: center;
        }

        .plant { font-size: 2rem; animation: grow 0.5s ease-out; }
        @keyframes grow { from { transform: scale(0); } to { transform: scale(1); } }

        .input-card {
            width: 100%;
            background: white;
            padding: 20px;
            border-radius: 25px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.03);
            box-sizing: border-box;
        }

        textarea {
            width: 100%;
            height: 80px;
            border: none;
            background: #F5F5F5;
            border-radius: 15px;
            padding: 15px;
            font-size: 1rem;
            margin-bottom: 15px;
            box-sizing: border-box;
            outline: none;
        }

        .btn-glow {
            background: var(--forest);
            color: white;
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-glow:active { transform: scale(0.98); opacity: 0.9; }

        .history-card {
            margin-top: 20px;
            width: 100%;
            font-size: 0.8rem;
            color: var(--accent);
        }

        .history-item {
            background: var(--mint);
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 8px;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="garden-area" id="garden">
        <!-- Plants will appear here as you reframe -->
        <span class="plant">🌳</span>
    </div>

    <div class="input-card">
        <h2 style="margin-top:0">Instant Reframe</h2>
        <textarea id="thoughtInput" placeholder="I'm feeling angry about..."></textarea>
        <button class="btn-glow" onclick="processThought()">Plant a Positive Thought</button>
    </div>

    <div id="reframeResult" style="margin-top: 20px; text-align: center; font-weight: 500; display: none;"></div>

    <div class="history-card">
        <p><strong>Your Recent Growth:</strong></p>
        <div id="historyList"></div>
    </div>
</div>

<script>
    let history = [];

    function processThought() {
        const input = document.getElementById('thoughtInput').value;
        if(!input) return;

        const resultDiv = document.getElementById('reframeResult');
        const garden = document.getElementById('garden');
        
        // Simple AI Logic
        const reframes = [
            "This challenge is refining your strength.",
            "You are breathing through the storm.",
            "Energy is shifting toward a solution.",
            "This moment does not define your future."
        ];
        const randomReframe = reframes[Math.floor(Math.random() * reframes.length)];

        // Update UI
        resultDiv.innerText = "✨ " + randomReframe;
        resultDiv.style.display = 'block';

        // Grow a plant in the garden
        const plants = ["🌱", "🌿", "🍀", "🌸", "🌻"];
        const newPlant = document.createElement('span');
        newPlant.className = 'plant';
        newPlant.innerText = plants[Math.floor(Math.random() * plants.length)];
        garden.appendChild(newPlant);

        // Save to History
        addHistory(randomReframe);
        
        document.getElementById('thoughtInput').value = "";
    }

    function addHistory(text) {
        const list = document.getElementById('historyList');
        const item = document.createElement('div');
        item.className = 'history-item';
        item.innerText = text;
        list.prepend(item);
        
        if(list.children.length > 3) list.lastChild.remove();
    }
</script>

</body>
</html>
